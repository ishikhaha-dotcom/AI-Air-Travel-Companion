# Render Blueprint — WayFinder AI Air Travel Companion
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: wayfinder
    runtime: python
    plan: free
    buildCommand: |
      pip install -r backend/requirements.txt &&
      cd frontend && npm install && npm run build
    startCommand: cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: NODE_VERSION
        value: "20.18.3"
      - key: LLM_MODE
        value: "off"
